name: Boxwrite Build EXE (With Icon)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies (None)
        run: |
          python -m pip install --upgrade pip
          # 因为是内置库，这里只需安装 PyInstaller，无需执行 requirements.txt
          pip install pyinstaller
        shell: cmd

      - name: Clean old builds
        run: |
          if exist dist rmdir /s /q dist
          if exist build rmdir /s /q build
          if exist *.spec del /f /q *.spec
        shell: cmd

      - name: Build EXE with Custom Icon
        run: |
          # 核心命令：--icon 指定图标路径
          # 假设你上传的图标文件叫 icon.ico
          pyinstaller --onefile --clean --icon=icon.ico main.py
        shell: cmd

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: boxwrite-exe-icon
          path: dist/*.exe
          if-no-files-found: error
