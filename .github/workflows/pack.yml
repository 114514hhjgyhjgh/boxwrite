name: Boxwrite Build EXE (Final Debug)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      # 🔍 步骤1：强制打印根目录，再次确认文件存在（心理安慰）
      - name: Verify File Existence
        run: |
          echo "===== Listing Root Directory ====="
          dir
          echo "===== Checking main.py ====="
          if exist main.py (echo main.py FOUND!) else (echo main.py MISSING!)
        shell: cmd

      # 🔧 步骤2：设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 步骤3：安装依赖（含容错处理）
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if exist requirements.txt (
            echo Installing requirements...
            pip install -r requirements.txt
          ) else (
            echo No requirements.txt found, skipping...
          )
        shell: cmd

      # 🐍 步骤4：核心诊断——先运行 main.py 看是否报错
      - name: Test main.py Runtime
        id: runtime_test
        run: |
          echo "===== Testing main.py ====="
          python main.py
        shell: cmd
        continue-on-error: true # 允许这里报错，继续看日志

      # 🏗️ 步骤5：如果运行测试失败，直接查看打包日志
      - name: Build EXE (With Debug Log)
        run: |
          pyinstaller --onefile --clean --log-level=DEBUG main.py
        shell: cmd

      # 📤 步骤6：上传产物
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: boxwrite-exe
          path: dist/*.exe
          if-no-files-found: error
